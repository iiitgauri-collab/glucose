<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlucoSense AI Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#f4f7f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.phone{

width:390px;
height:844px;
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.15);
padding:35px;

}

.logo{

width:90px;
height:90px;
margin:auto;
border-radius:20px;
background:#eef8f6;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
color:#0c8074;

}

h1{

text-align:center;
margin-top:25px;
font-size:40px;
font-weight:700;
color:#00695c;

}

.subtitle{

text-align:center;
color:#666;
margin-top:8px;
margin-bottom:45px;

}

label{

display:block;
font-size:14px;
font-weight:500;
margin-bottom:8px;
color:#333;

}

.input-box{

display:flex;
align-items:center;
border:1px solid #d9d9d9;
border-radius:10px;
padding:13px;
margin-bottom:25px;

}

.input-box i{

margin-right:10px;
color:#777;

}

.input-box input{

border:none;
outline:none;
width:100%;
font-size:15px;

}

.forgot{

text-align:right;
font-size:14px;
margin-top:-10px;
margin-bottom:30px;

}

.forgot a{

text-decoration:none;
color:#0b7f73;
font-weight:500;

}

.login{

width:100%;
padding:16px;
background:#00796b;
border:none;
color:white;
font-size:17px;
font-weight:600;
border-radius:12px;
cursor:pointer;
transition:.3s;

}

.login:hover{

background:#006357;

}

.divider{

display:flex;
align-items:center;
margin:40px 0;

}

.divider::before,
.divider::after{

content:"";
flex:1;
height:1px;
background:#ddd;

}

.divider span{

padding:0 15px;
color:#666;
font-size:14px;

}

.social{

display:flex;
gap:15px;

}

.social button{

flex:1;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
background:white;
font-size:16px;
cursor:pointer;
font-weight:500;

}

.signup{

margin-top:45px;
text-align:center;

}

.signup a{

color:#00796b;
text-decoration:none;
font-weight:600;

}

.footer{

margin-top:55px;
display:flex;
align-items:flex-start;
gap:15px;

}

.footer i{

font-size:22px;
color:#00796b;

}

.footer h3{

font-size:18px;
margin-bottom:5px;

}

.footer p{

font-size:13px;
color:#666;

}

</style>

</head>
<body>

<div class="phone">

<div class="logo">
<i class="fa-solid fa-heart-pulse"></i>
</div>

<h1>GlucoSense AI</h1>

<p class="subtitle">
Smart Glucose Monitoring
</p>

<label>Email Address</label>

<div class="input-box">

<i class="fa-regular fa-envelope"></i>

<input
type="email"
placeholder="Enter your email">

</div>

<label>Password</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Enter your password">

</div>

<div class="forgot">
<a href="#">Forgot Password?</a>
</div>

<button class="login">
Sign In
</button>

<div class="divider">
<span>or continue with</span>
</div>

<div class="social">

<button>
<i class="fab fa-google"></i>
Google
</button>

<button>
<i class="fab fa-apple"></i>
Apple
</button>

</div>

<div class="signup">

Don't have an account?

<a href="#">
Sign Up
</a>

</div>

<div class="footer">

<i class="fa-solid fa-sparkles"></i>

<div>

<h3>AI-Powered Insights</h3>

<p>
Predict blood glucose levels instantly using wearable data.
</p>

</div>

</div>

</div>

</body>
</html>
